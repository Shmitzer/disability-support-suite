name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The Prisma client is generated from schema (no DB connection needed).
      - run: npx prisma generate

      - run: npm run lint

      # Tenant-scope guard: fails on an unscoped tenant-table list/bulk read (the
      # RLS-bypass-via-Prisma is load-bearing — one unscoped query = a cross-tenant leak).
      - run: npm run check:tenant-scope

      - run: npx tsc --noEmit

      - run: npm test

      # Build needs public Supabase env present and a syntactically-valid DATABASE_URL.
      # These are dummy values — the build never connects to either service.
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy_anon_key
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
