<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="design-system/tokens/fonts.css">
<link rel="stylesheet" href="design-system/tokens/colors.css">
<link rel="stylesheet" href="design-system/tokens/typography.css">
</helmet>
<div style="display:inline-flex;align-items:center">{{ content }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:200,&quot;height&quot;:72},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;teal&quot;,&quot;white&quot;],&quot;default&quot;:&quot;teal&quot;,&quot;tsType&quot;:&quot;'teal'|'white'&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:34,&quot;min&quot;:16,&quot;max&quot;:120,&quot;tsType&quot;:&quot;number&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;lockup&quot;,&quot;mark&quot;],&quot;default&quot;:&quot;lockup&quot;,&quot;tsType&quot;:&quot;'lockup'|'mark'&quot;}}">
class Component extends DCLogic {
  _n = 0;

  heartMark(size, fill) {
    const R = React.createElement;
    const uid = 'logo' + (this._n++);
    const HEART = "M32 49 C10 34 11 17 23 17 C28.5 17 31.5 21 32 24 C32.5 21 35.5 17 41 17 C53 17 54 34 32 49 Z";
    const CARVE = "M29.5 18.5 A9 9 0 1 0 29.5 35.5";
    return R('svg', { width: size, height: size, viewBox: '0 0 64 64', style: { display: 'block', overflow: 'visible', flexShrink: 0 } },
      R('defs', null, R('mask', { id: uid },
        R('rect', { x: 0, y: 0, width: 64, height: 64, fill: '#fff' }),
        R('path', { d: CARVE, fill: 'none', stroke: '#000', strokeWidth: 5.5, strokeLinecap: 'round', transform: 'rotate(-18 21 27)' })
      )),
      R('path', { d: HEART, fill: fill, mask: `url(#${uid})` })
    );
  }

  text(t, px, color) {
    return React.createElement('span', { style: { fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: px + 'px', lineHeight: 1, color, letterSpacing: '-0.02em', whiteSpace: 'pre' } }, t);
  }

  // the 'i' as a stem on the baseline with the heart mark as its tittle
  iStem(px, color) {
    const R = React.createElement;
    const w = 0.165 * px;
    const sp = 0.085;
    return R('span', { style: { position: 'relative', display: 'inline-block', width: w + 'px', height: (px * 0.515) + 'px', background: color, borderRadius: '99px', verticalAlign: 'baseline', marginLeft: (px * sp) + 'px', marginRight: (px * (sp + 0.01)) + 'px' } },
      R('span', { style: { position: 'absolute', left: '50%', bottom: '100%', transform: 'translateX(-50%)', marginBottom: (px * 0.04) + 'px', lineHeight: 0 } }, this.heartMark(px * 0.4, 'var(--clay)'))
    );
  }

  word(px, color) {
    const R = React.createElement;
    return R('span', { style: { display: 'inline-flex', alignItems: 'baseline' } },
      this.text('Ca', px, color),
      this.iStem(px, color),
      this.text('ra', px, color)
    );
  }

  renderVals() {
    const tone = this.props.tone ?? 'teal';
    const size = Number(this.props.size ?? 40);
    const variant = this.props.variant ?? 'lockup';
    const color = tone === 'white' ? '#fff' : 'var(--brand)';
    return { content: variant === 'mark' ? this.heartMark(size, color) : this.word(size, color) };
  }
}
</script>
</body>
</html>
