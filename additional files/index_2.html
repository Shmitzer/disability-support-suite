<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0D1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DSW Shift Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1117;color:#E6EDF3;font-family:system-ui,sans-serif;font-size:14px;min-height:100vh;-webkit-tap-highlight-color:transparent}
.page{max-width:560px;margin:0 auto;padding:14px}
.card{background:#1C2230;border-radius:14px;padding:14px;border:1px solid #2D3748;margin-bottom:12px}
input,textarea,select{width:100%;padding:9px 11px;border-radius:9px;border:1px solid #2D3748;background:#161B22;color:#E6EDF3;font-size:13px;font-family:inherit;outline:none;-webkit-appearance:none}
textarea{resize:vertical}
.btn{padding:11px 18px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:14px;background:#4F8EF7;color:#fff;width:100%}
.btn:disabled{background:#2D3748;color:#7D8590;cursor:not-allowed}
.ghost{background:none;border:1px solid #2D3748;border-radius:10px;color:#7D8590;cursor:pointer;font-size:12px;padding:8px;width:100%;margin-top:8px;display:block}
.chip{padding:6px 11px;border-radius:18px;border:1px solid #2D3748;background:#161B22;color:#7D8590;cursor:pointer;font-size:12px}
.chip.sel{font-weight:700}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.lbl{font-size:10px;color:#7D8590;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.row{display:flex;gap:8px;align-items:center}
.ibtn{width:34px;height:34px;border-radius:8px;background:#161B22;border:1px solid #2D3748;color:#7D8590;cursor:pointer;font-size:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0}
.entry{display:flex;gap:8px;padding:9px 11px;border-radius:10px;background:#161B22;border:1px solid #2D3748;margin-bottom:5px;align-items:flex-start}
.bdg{font-size:10px;padding:1px 7px;border-radius:9px;display:inline-block}
.mic-btn{width:88px;height:88px;border-radius:44px;border:4px solid transparent;cursor:pointer;font-size:36px;display:flex;align-items:center;justify-content:center;transition:background .15s,box-shadow .15s;-webkit-user-select:none;user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent}
.ctr{text-align:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.catbtn{padding:12px 10px;border-radius:12px;border:none;text-align:left;display:flex;align-items:center;gap:9px;cursor:pointer;font-weight:700;font-size:12px}
.tw{display:flex;align-items:center;justify-content:space-between}
.tog{width:48px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.togk{width:20px;height:20px;border-radius:10px;background:#fff;position:absolute;top:3px;transition:left .2s}
.exc{padding:8px 12px;border-radius:10px;border:1px solid #2D3748;background:#161B22;color:#7D8590;cursor:pointer;font-size:12px;line-height:1.4;text-align:left;width:100%;margin-bottom:6px;display:block}
.exc.sel{background:#0F2A1C;border-color:#3DDC84;color:#3DDC84;font-weight:600}
.tv-btn{padding:7px 12px;border-radius:8px;border:1px solid #2D3748;background:#161B22;color:#7D8590;cursor:pointer;font-size:12px;font-weight:500}
.tv-btn.sel{border-color:#4F8EF7;background:#1A2A4A;color:#4F8EF7;font-weight:700}
.veh-btn{padding:9px 8px;border-radius:9px;border:1px solid #2D3748;background:#161B22;color:#7D8590;cursor:pointer;font-size:11px;font-weight:500;text-align:center;flex:1}
.veh-btn.sel{border-color:#22D3EE;background:#072630;color:#22D3EE;font-weight:700}
.drag-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;background:#1C2230;border:1px solid #2D3748;margin-bottom:8px;cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none}
.drag-item.dragging{opacity:0.4;border-style:dashed}
.drag-item.drag-over{border-color:#4F8EF7;background:#1A2A4A}

.portal-card{background:#1C2230;border-radius:16px;padding:16px;border:1px solid #2D3748;margin-bottom:12px;cursor:pointer;transition:border-color .15s,background .15s}
.portal-card:hover{border-color:#4F8EF7;background:#1A2235}
.portal-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 10px;border-radius:14px;border:1px solid #2D3748;background:#1C2230;cursor:pointer;text-align:center;transition:all .15s;gap:6px}
.portal-tile:hover{border-color:#4F8EF7;background:#1A2235}
.nav-tab{padding:8px 14px;border-radius:8px;border:none;background:none;color:#7D8590;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.nav-tab.active{background:#1A2A4A;color:#4F8EF7}
.shift-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700}
.cal-day{padding:6px 4px;border-radius:8px;text-align:center;cursor:pointer;min-width:36px}
.cal-day.today{background:#1A2A4A;color:#4F8EF7;font-weight:800}
.cal-day.has-shift{border-bottom:3px solid #3DDC84}
.cal-day.available{border-bottom:3px solid #F5A623}
.note-card{background:#161B22;border-radius:10px;padding:10px 12px;border:1px solid #2D3748;margin-bottom:8px}

</style>
</head>
<body>
<div id="app"></div>
<script>
const C={bg:"#0D1117",su:"#161B22",ca:"#1C2230",bo:"#2D3748",ac:"#4F8EF7",ad:"#1A2A4A",gr:"#3DDC84",gd:"#0F2A1C",am:"#F5A623",amd:"#2E1F05",re:"#E05A5A",rd:"#2E0F0F",pu:"#A78BFA",pd:"#1E1635",cy:"#22D3EE",cd:"#072630",pi:"#F472B6",pid:"#2D1020",te:"#2DD4BF",td:"#0A2520",mu:"#7D8590",li:"#C9D1D9"};

const CATS={
  activity:{label:"Activities & Outings",icon:"🎯",color:C.ac,dim:C.ad,chips:["Community outing","Day program","Medical appointment","Shopping","Exercise/walk","Swimming","Social visit","Recreational activity","Music/arts","Volunteering"]},
  food:{label:"Food & Meals",icon:"🍽️",color:C.am,dim:C.amd,chips:["Breakfast","Morning tea","Lunch","Afternoon tea","Dinner","Supper","Soft diet","Pureed diet"]},
  fluid:{label:"Fluids",icon:"💧",color:C.cy,dim:C.cd,chips:["Water","Tea","Coffee","Juice","Milk","Cordial","Thickened fluid","Supplement drink","Refused fluids"]},
  toilet:{label:"Toileting",icon:"🚽",color:C.gr,dim:C.gd,chips:["Urination","Void – incontinent","Bowel movement – normal","Bowel movement – loose","Bowel movement – constipated","Bowel movement – nil","Assisted to toilet","Independent toileting","Changed continence aid","Catheter care"]},
  hygiene:{label:"Hygiene",icon:"🪥",color:C.pu,dim:C.pd,chips:["Full shower – assisted","Full shower – supervised","Full shower – independent","Bed bath","Hair wash","Teeth brushed – assisted","Teeth brushed – independent","Oral care","Nail care","Shaving","Skin care"]},
  support:{label:"Direct Support",icon:"🤝",color:C.pi,dim:C.pid,chips:["Showering assistance","Dressing assistance","Grooming assistance","Meal preparation","Eating support","Mobility support","Transfer assist","Hoist transfer","Communication support","Behaviour support","Emotional support","Medication prompt","Medication admin"]},
  incident:{label:"Incident / Behaviour",icon:"⚠️",color:C.re,dim:C.rd,chips:["Behaviour of concern","Physical aggression","Verbal aggression","Self-harm behaviour","Property damage","Fall – no injury","Fall – with injury","Injury – first aid","Seizure","Medical emergency","Near miss","Restrictive practice","Police notified","Guardian notified"]},
  medication:{label:"Medication",icon:"💊",color:C.te,dim:C.td,chips:["Morning meds – given","Afternoon meds – given","Evening meds – given","Night meds – given","PRN administered","Medication refused","Topical applied","Medication error"]},
  misc:{label:"Misc.",icon:"📌",color:"#9CA3AF",dim:"#1F2937",chips:[]}
};

const DEFAULT_LAYOUT=["mic","routine","categories","timeline"];
const DEFAULT_CAT_ORDER=Object.keys(CATS);

const BLOCK_META={
  mic:{label:"🎙 Voice recorder",desc:"Push-to-talk / click-to-talk + type quick notes"},
  routine:{label:"⭐ Routine suggestions",desc:"Client's most frequently logged items"},
  categories:{label:"🗂 Log by category",desc:"Category tiles with chip selection"},
  timeline:{label:"📋 Shift timeline",desc:"All logged entries for this shift"},
};

const ls={g:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};
const nowT=()=>{const d=new Date();return`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;};
const fmtDate=()=>new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
function fmtTime(te){if(!te||te.mode==="ns")return"time not specified";if(te.mode==="range")return`between ${te.from||"?"}–${te.to||"?"}`;return te.time||nowT();}
function fmtTimeReport(te){if(!te||te.mode==="ns")return"(time not specified)";if(te.mode==="range")return`between ${te.from||"?"}–${te.to||"?"}`;return te.time||"";}
function autoCat(t){t=(t||"").toLowerCase();if(/shower|bath|teeth|brush|hair|nail|groom|wash|dress|cloth/.test(t))return"hygiene";if(/eat|food|meal|breakfast|lunch|dinner|snack|cook|appetite/.test(t))return"food";if(/drink|water|fluid|juice|tea|coffee|milk|thicken/.test(t))return"fluid";if(/toilet|void|bowel|continent|pad|catheter|ostomy/.test(t))return"toilet";if(/outing|activit|visit|walk|swim|shop|appointment|transport|driv|travel|took/.test(t))return"activity";if(/medic|tablet|pill|dose|prn|cream|ointment/.test(t))return"medication";if(/assist|support|help|prompt|guid|mobil|transfer|hoist/.test(t)&&!/transport|driv|travel|took|drove|vehicle/.test(t))return"support";if(/incident|behav|aggress|fall|injur|seiz|emergency|concern/.test(t))return"incident";return"misc";}
function needsTransport(cat,detail){return cat==="activity"||/transport|driv|travel|took|drove|vehicle|bus|train|ferry|outing|appointment/.test((detail||"").toLowerCase());}

// ── Speech ─────────────────────────────────────────────────────────────────
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recog=null,recogRunning=false,micHeld=false,sFinal="",sInterim="";
let onSpeechResult=null,onSpeechError=null;
function buildRecog(){if(!SR)return;if(recog){try{recog.abort();}catch(e){}}recog=new SR();recog.continuous=true;recog.interimResults=true;recog.lang="en-AU";recog.maxAlternatives=1;recog.onstart=()=>{recogRunning=true;};recog.onresult=(e)=>{let fin="",int="";for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript;else int+=e.results[i][0].transcript;}if(fin)sFinal+=fin;sInterim=int;if(onSpeechResult)onSpeechResult(sFinal,sInterim);};recog.onerror=(e)=>{recogRunning=false;if(e.error==="no-speech"||e.error==="audio-capture"){if(micHeld)setTimeout(startRecog,150);}else if(e.error==="not-allowed"){if(onSpeechError)onSpeechError("not-allowed");}};recog.onend=()=>{recogRunning=false;if(micHeld){setTimeout(startRecog,100);}else{if(onSpeechResult)onSpeechResult(sFinal,"");}};return recog;}
function startRecog(){if(recogRunning)return;buildRecog();if(!recog)return;try{recog.start();}catch(e){setTimeout(startRecog,200);}}
function stopRecog(){micHeld=false;if(!recog||!recogRunning)return;try{recog.stop();}catch(e){}}
function resetSpeech(){sFinal="";sInterim="";}

// ── State ──────────────────────────────────────────────────────────────────
let state={
  screen:"login",dsw:ls.g("dsw",""),client:"",clientManager:ls.g("manager",""),shiftStart:nowT(),
  kmLimit:ls.g("kmLimit",50),adminPin:ls.g("adminPin","1234"),
  aiProvider:ls.g("aiProvider","groq"),
  aiModel:ls.g("aiModel","llama-3.3-70b-versatile"),
  apiKey:ls.g("apiKey",""),
  groqKey:ls.g("groqKey",""),
  entries:[],chips:ls.g("chips",JSON.parse(JSON.stringify(CATS))),profiles:ls.g("profiles",{}),
  activeCat:null,selChips:[],entryNote:"",entryConsumption:"",entryQuantityML:"",noteTokens:[],freeNote:"",timeEntry:{mode:"specific",time:nowT()},
  pageLayout:ls.g("pageLayout",[...DEFAULT_LAYOUT]),
  catOrder:ls.g("catOrder",[...DEFAULT_CAT_ORDER]),
  draftLayout:null,draftCatOrder:null,
  quickText:"",quickState:"idle",quickTime:"",
  pushToTalk:ls.g("ptt",true),micPermDenied:false,
  bin:ls.g("bin",[]).filter(i=>i.at>Date.now()-3*86400000),
  report:"",generating:false,copied:false,filterCat:"all",
  suggestions:[],shiftEnd:"",
  customCat:null,newChip:"",voiceTarget:null,
  showTransport:false,transportEntryId:null,
  transport:{vehicle:"",ptSub:"",km:"",overApproved:null,overReason:"",managerNotified:false},
  showAdminUnlock:false,adminPinInput:"",suggError:"",
  showExport:false,exportCopied:"",
  showImport:false,importText:"",importErrors:[],importPreview:[],importDone:false,
  photoAnalysis:null,      // {type:"urine"|"stool", result, pending}
  showPhotoAnalysis:false,
  stoolTypeOverride:null,
  showReceiptPrompt:false,
  receiptPendingLog:null,  // {toLog, te, photos} waiting for receipt decision
  receiptPhoto:null,       // photo of receipt if taken




  stoolAnalysisResult:null,
  micMode:"mic",  // mic | camera
  cameraActive:false,
  cameraPhoto:null,   // base64 of captured photo
  cameraStream:null,  // MediaStream ref stored outside state
  quickPhotos:[],     // photos attached to the quick note
  entryPhotos:[],     // photos attached to the category entry panel
  chipTrail:[],       // [{chip, suboptions:[]}] — breadcrumb drill trail
  chipCounts:{},  // {chipText: count} for multiplier logic
  primaryChip:null, // the currently selected primary chip
  drillOptions:[],    // current level sub-options from AI
  drillLoading:false, // fetching sub-options
  drillError:"",
  chipPageOffset:0,
  showCustomChipInput:false,
  customChipInput:"",
  userCustomChips:ls.g("userCustomChips",{}),
  // ── Portal / login state ─────────────────────────────────────────────────
  loggedIn:ls.g("loggedIn",false),
  loginUser:"admin",loginPass:"admin",loginError:"",
  currentUser:ls.g("currentUser",{name:"Admin",role:"admin"}),
  portalTab:"home",
  calView:"week",
  sharedNotes:ls.g("sharedNotes",[]),
  newNoteText:"",newNoteShared:true,
  calDate:new Date().toISOString().slice(0,10),
  demoShifts:[
    {id:1,date:new Date().toISOString().slice(0,10),start:"07:00",end:"15:00",client:"James",status:"active",location:"123 Smith St"},
    {id:2,date:new Date(Date.now()+86400000).toISOString().slice(0,10),start:"15:00",end:"23:00",client:"Sarah",status:"assigned",location:"45 Park Ave"},
    {id:3,date:new Date(Date.now()+2*86400000).toISOString().slice(0,10),start:"07:00",end:"15:00",client:"James",status:"assigned",location:"123 Smith St"},
    {id:4,date:new Date(Date.now()+4*86400000).toISOString().slice(0,10),start:"07:00",end:"15:00",client:"Michael",status:"available",location:"78 Oak Rd"},
    {id:5,date:new Date(Date.now()-86400000).toISOString().slice(0,10),start:"07:00",end:"15:00",client:"James",status:"completed",location:"123 Smith St"},
  ],
};

// ── Helpers ────────────────────────────────────────────────────────────────
function learn(cat,detail){if(!state.client)return;const p={...(state.profiles[state.client]||{freq:{}})};const k=`${cat}::${detail}`;p.freq[k]=(p.freq[k]||0)+1;state.profiles={...state.profiles,[state.client]:p};ls.s("profiles",state.profiles);}
function routineS(){const p=state.profiles[state.client];if(!p)return[];return Object.entries(p.freq).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k])=>{const[c,d]=k.split("::");return{cat:c,detail:d};});}
function addEntry(cat,detail,note,te,fromV,photos){const now=new Date().toISOString();const e={id:Date.now()+Math.random(),category:cat,detail,note:note||"",timeEntry:te||{mode:"ns"},fromVoice:!!fromV,catConf:!fromV,transport:null,photos:photos||[],createdAt:now,editHistory:[]};state.entries=[...state.entries,e];learn(cat,detail);if(needsTransport(cat,detail)){state.transportEntryId=e.id;state.transport={vehicle:"",ptSub:"",km:"",overApproved:null,overReason:"",managerNotified:false};state.showTransport=true;}return e.id;}
function saveTransport(){const t=state.transport;if(!t.vehicle){state.entries=state.entries.map(e=>e.id===state.transportEntryId?{...e,transport:null}:e);state.showTransport=false;state.transportEntryId=null;return;}const over=t.km&&state.kmLimit&&parseFloat(t.km)>state.kmLimit;state.entries=state.entries.map(e=>e.id===state.transportEntryId?{...e,transport:{...t,overLimit:over}}:e);state.showTransport=false;state.transportEntryId=null;}

// ── Mic wiring ─────────────────────────────────────────────────────────────
function wireMic(){
  const btn=document.getElementById("micBtn");if(!btn)return;
  const fresh=btn.cloneNode(true);btn.parentNode.replaceChild(fresh,btn);
  const mic=document.getElementById("micBtn");
  if(state.pushToTalk){
    mic.addEventListener("mousedown",pttDown);mic.addEventListener("touchstart",pttDown,{passive:false});
    mic.addEventListener("mouseup",pttUp);mic.addEventListener("touchend",pttUp,{passive:false});
    mic.addEventListener("mouseleave",pttUp);mic.addEventListener("touchcancel",pttUp,{passive:false});
  }else{
    mic.addEventListener("click",cttClick);
  }
}
function pttDown(e){e.preventDefault();if(state.quickState==="recording")return;state.quickState="recording";state.quickText="";state.quickTime=nowT();micHeld=true;resetSpeech();onSpeechResult=(fin,int)=>{state.quickText=fin+(int?" "+int:"");updateMicUI();};onSpeechError=(err)=>{if(err==="not-allowed"){state.micPermDenied=true;state.quickState="idle";micHeld=false;render();}};startRecog();updateMicUI();}
function pttUp(e){e.preventDefault();if(state.quickState!=="recording")return;micHeld=false;stopRecog();state.quickState="confirming";state.quickTime=nowT();updateMicUI();}
function cttClick(e){e.preventDefault();if(state.quickState==="recording"){micHeld=false;stopRecog();state.quickState="confirming";state.quickTime=nowT();updateMicUI();}else{if(state.quickState==="confirming"){doDisc();return;}state.quickState="recording";state.quickText="";state.quickTime=nowT();micHeld=true;resetSpeech();onSpeechResult=(fin,int)=>{state.quickText=fin+(int?" "+int:"");updateMicUI();};onSpeechError=(err)=>{if(err==="not-allowed"){state.micPermDenied=true;state.quickState="idle";micHeld=false;render();}};startRecog();updateMicUI();}}

function updateMicUI(){
  const isRec=state.quickState==="recording",isConf=state.quickState==="confirming";
  const mic=document.getElementById("micBtn");const hint=document.getElementById("micHint");
  const liveBox=document.getElementById("liveBox");const confirmRow=document.getElementById("confirmRow");const typeArea=document.getElementById("typeArea");
  if(!mic)return;
  if(isRec){mic.style.background=C.re;mic.style.boxShadow=`0 0 0 8px ${C.re}22,0 0 0 16px ${C.re}11`;mic.textContent="⏹";if(hint){hint.style.color=C.re;hint.textContent=state.pushToTalk?"Release to stop":"Tap to stop";}if(liveBox){liveBox.style.display="block";liveBox.textContent=state.quickText||"Listening…";}if(confirmRow)confirmRow.style.display="none";if(typeArea)typeArea.style.display="none";}
  else if(isConf){mic.style.background=C.am;mic.style.boxShadow="none";mic.textContent="✏️";if(hint){hint.style.color=C.am;hint.textContent="Review your note";}if(liveBox)liveBox.style.display="none";if(confirmRow){confirmRow.style.display="block";const ta=document.getElementById("quickNoteTA");if(ta)ta.value=state.quickText;}if(typeArea)typeArea.style.display="none";}
  else{mic.style.background=C.ac;mic.style.boxShadow="none";mic.textContent="🎙";if(hint){hint.style.color=C.mu;hint.textContent=SR?(state.pushToTalk?"Hold to record":"Tap to record"):"Type a note below";}if(liveBox)liveBox.style.display="none";if(confirmRow)confirmRow.style.display="none";if(typeArea)typeArea.style.display="block";}
}

function doConf(){const ta=document.getElementById("quickNoteTA");const t=(ta?ta.value:state.quickText).trim();if(!t&&!state.quickPhotos.length){state.quickState="idle";render();return;}const te={mode:"specific",time:state.quickTime||nowT()};const photos=[...state.quickPhotos];addEntry(autoCat(t||"Photo note"),t||"Photo note","",te,true,photos);state.quickText="";state.quickState="idle";state.quickPhotos=[];resetSpeech();render();}
function doDisc(){const ta=document.getElementById("quickNoteTA");const t=(ta?ta.value:state.quickText).trim();if(t)state.bin=[...state.bin,{id:Date.now(),text:t,time:state.quickTime||nowT(),at:Date.now(),cat:autoCat(t)}];ls.s("bin",state.bin);state.quickText="";state.quickState="idle";resetSpeech();render();}

// ── Time widget ────────────────────────────────────────────────────────────
function timeWidget(te,pfx){
  te=te||{mode:"specific",time:nowT()};
  return`<div style="padding:10px 12px;background:#161B22;border-radius:10px;border:1px solid #2D3748;margin-bottom:11px">
<p class="lbl" style="margin-bottom:7px">Event time</p>
<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
<button class="tv-btn${te.mode==="specific"?" sel":""}" onclick="${pfx}TM('specific')">🕐 Specific</button>
<button class="tv-btn${te.mode==="range"?" sel":""}" onclick="${pfx}TM('range')">↔ Time range</button>
<button class="tv-btn${te.mode==="ns"?" sel":""}" onclick="${pfx}TM('ns')">— Not specified</button>
</div>
${te.mode==="specific"?`<div style="display:flex;gap:8px;align-items:center"><input type="time" value="${te.time||nowT()}" style="flex:1" onchange="${pfx}TV(this.value)"><button onclick="${pfx}TN()" style="padding:5px 10px;border-radius:7px;border:1px solid #2D3748;background:#161B22;color:#7D8590;font-size:11px;cursor:pointer;white-space:nowrap">Now</button></div>`:""}
${te.mode==="range"?`<div style="display:flex;gap:8px;align-items:center"><input type="time" value="${te.from||""}" style="flex:1" onchange="${pfx}TF(this.value)"><span style="color:#7D8590;font-size:12px">to</span><input type="time" value="${te.to||""}" style="flex:1" onchange="${pfx}TT(this.value)"></div>`:""}
${te.mode==="ns"?`<p style="font-size:11px;color:#7D8590;padding:4px 0">Will appear as "time not specified" in the report.</p>`:""}

// ── Camera & photo helpers ─────────────────────────────────────────────────
let _cameraStream = null;

function compressPhoto(dataUrl, maxPx, quality, cb){
  const img = new Image();
  img.onload = () => {
    const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
    const w = Math.round(img.width * scale);
    const h = Math.round(img.height * scale);
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    c.getContext("2d").drawImage(img, 0, 0, w, h);
    cb(c.toDataURL("image/jpeg", quality));
  };
  img.src = dataUrl;
}

async function startCamera(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    _cameraStream = stream;
    state.cameraActive = true;
    state.cameraPhoto = null;
    render();
    // After render, attach stream to video element
    setTimeout(() => {
      const v = document.getElementById("cameraFeed");
      if(v){ v.srcObject = stream; v.play(); }
    }, 50);
  } catch(err) {
    alert("Camera access denied or unavailable: " + err.message);
    state.micMode = "mic";
    render();
  }
}

function stopCamera(){
  if(_cameraStream){ _cameraStream.getTracks().forEach(t => t.stop()); _cameraStream = null; }
  state.cameraActive = false;
  state.cameraPhoto = null;
}

function capturePhoto(){
  const v = document.getElementById("cameraFeed");
  if(!v) return;
  const c = document.createElement("canvas");
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext("2d").drawImage(v, 0, 0);
  const raw = c.toDataURL("image/jpeg", 0.9);
  // Stop stream — camera used, we have the shot
  if(_cameraStream){ _cameraStream.getTracks().forEach(t => t.stop()); _cameraStream = null; }
  state.cameraActive = false;
  // Compress to max 1200px
  compressPhoto(raw, 1200, 0.82, compressed => {
    state.cameraPhoto = compressed;
    render();
  });
}

function retakePhoto(){
  state.cameraPhoto = null;
  startCamera();
}

function acceptPhotoToQuick(){
  if(!state.cameraPhoto) return;
  if(state.quickPhotos.length >= 5){ alert("Maximum 5 photos per note"); return; }
  state.quickPhotos.push(state.cameraPhoto);
  state.cameraPhoto = null;
  state.micMode = "mic";
  stopCamera();
  render();
}

function acceptPhotoToEntry(){
  if(!state.cameraPhoto) return;
  if(state.entryPhotos.length >= 5){ alert("Maximum 5 photos per entry"); return; }
  state.entryPhotos.push(state.cameraPhoto);
  state.cameraPhoto = null;
  state.micMode = "mic";
  stopCamera();
  // Keep category panel open
  render();
}

function removeQuickPhoto(idx){ state.quickPhotos.splice(idx, 1); render(); }
function removeEntryPhoto(idx){ state.entryPhotos.splice(idx, 1); render(); }

function replacePhoto(target, idx){
  // target: "quick" | "entry"
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "image/*"; inp.capture = "environment";
  inp.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      compressPhoto(ev.target.result, 1200, 0.82, compressed => {
        if(target === "quick") state.quickPhotos[idx] = compressed;
        else state.entryPhotos[idx] = compressed;
        render();
      });
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function addPhotoFromFile(target){
  // target: "quick" | "entry"
  const arr = target === "quick" ? state.quickPhotos : state.entryPhotos;
  if(arr.length >= 5){ alert("Maximum 5 photos per note"); return; }
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "image/*"; inp.multiple = true;
  inp.onchange = e => {
    const files = Array.from(e.target.files).slice(0, 5 - arr.length);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        compressPhoto(ev.target.result, 1200, 0.82, compressed => {
          if(target === "quick"){ if(state.quickPhotos.length < 5) state.quickPhotos.push(compressed); }
          else { if(state.entryPhotos.length < 5) state.entryPhotos.push(compressed); }
          render();
        });
      };
      reader.readAsDataURL(file);
    });
  };
  inp.click();
}

function switchMicMode(mode){
  if(mode === state.micMode) return;
  if(state.micMode === "camera"){ stopCamera(); }
  state.micMode = mode;
  if(mode === "camera") startCamera();
  else render();
}

// ── Photo clinical analysis ────────────────────────────────────────────────
async function analysePhoto(photoBase64, context){
  // context: "urine" | "stool" | "unknown"
  state.photoAnalysis = {type:context, pending:true, result:null};
  state.showPhotoAnalysis = true;
  state.stoolTypeOverride = null;
  state.stoolAnalysisResult = null;
  render();

  const key = state.aiProvider==="groq" ? state.groqKey : state.apiKey;
  if(!key){
    state.photoAnalysis = {type:context, pending:false, result:null, error:"No API key set — cannot analyse photo."};
    render(); return;
  }

  // Build the prompt based on context
  let systemMsg, userMsg;
  if(context==="urine"){
    systemMsg = "You are a clinical documentation assistant helping NDIS disability support workers assess hydration based on urine colour. You have expertise in the standard urine colour hydration scale (1=pale/clear=well hydrated through to 8=dark brown=severely dehydrated). Be precise, clinical, and helpful. Return ONLY valid JSON, no markdown.";
    userMsg = `Analyse this photo of urine in a toilet bowl. Compare the colour you see to the standard urine hydration colour scale:\n${URINE_SCALE.map(u=>`Level ${u.level}: ${u.color} = ${u.hydration}`).join("\n")}\n\nReturn ONLY this JSON:\n{"level":3,"confidence":"high|medium|low","hydration":"status description","colour_observed":"what you see","action":"recommended action","alert":false,"severe":false,"notes":"any relevant observations e.g. cloudiness, unusual colour"}`;
  } else if(context==="stool"){
    systemMsg = "You are a clinical documentation assistant helping NDIS disability support workers classify stool type using the Bristol Stool Form Scale. Be precise and clinical. Return ONLY valid JSON, no markdown.";
    userMsg = `Analyse this photo and classify it using the Bristol Stool Form Scale:\n${BRISTOL_SCALE.map(b=>`Type ${b.type}: ${b.desc} (${b.category})`).join("\n")}\n\nReturn ONLY this JSON:\n{"type":4,"confidence":"high|medium|low","description":"what you observe in the photo","category":"Normal (ideal)","rationale":"why you chose this type","advice":"clinical recommendation","handover_required":false,"handover_notes":""}`;
  } else {
    systemMsg = "You are a clinical documentation assistant for NDIS disability support workers. Identify whether this photo shows urine in a toilet bowl or a stool/bowel movement, then provide appropriate clinical analysis. Return ONLY valid JSON.";
    userMsg = `Look at this photo and determine if it shows: (a) urine in a toilet bowl, (b) a stool/bowel movement, or (c) neither.\n\nReturn ONLY this JSON:\n{"detected":"urine|stool|neither","confidence":"high|medium|low","notes":"brief description"}`;
  }

  try {
    // Use Anthropic for vision (Groq vision is limited) — fall back to Anthropic claude-haiku
    const isGroq = state.aiProvider === "groq";
    const visionModel = isGroq ? state.aiModel : (state.aiModel || "claude-haiku-4-5-20251001");

    // Strip base64 prefix if present
    const b64 = photoBase64.replace(/^data:image\/\w+;base64,/, "");
    const mediaType = photoBase64.startsWith("data:image/png") ? "image/png" : "image/jpeg";

    let result;
    if(isGroq){
      // Groq with vision model
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
        body:JSON.stringify({
          model:"meta-llama/llama-4-scout-17b-16e-instruct", // Groq vision model
          max_tokens:600,
          messages:[
            {role:"system",content:systemMsg},
            {role:"user",content:[
              {type:"text",text:userMsg},
              {type:"image_url",image_url:{url:`data:${mediaType};base64,${b64}`}}
            ]}
          ]
        })
      });
      const d = await res.json();
      if(d.error) throw new Error(d.error.message);
      result = d.choices?.[0]?.message?.content || "";
    } else {
      // Anthropic vision
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model: visionModel,
          max_tokens:600,
          system: systemMsg,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:mediaType,data:b64}},
            {type:"text",text:userMsg}
          ]}]
        })
      });
      const d = await res.json();
      result = d.content?.map(b=>b.text||"").join("") || "";
    }

    const clean = result.trim().replace(/```json|```/g,"").trim();
    const parsed = JSON.parse(clean);
    state.photoAnalysis = {type:context, pending:false, result:parsed};
    if(context==="stool") state.stoolAnalysisResult = parsed;
  } catch(err){
    state.photoAnalysis = {type:context, pending:false, result:null, error:err.message};
  }
  render();
}

function acceptUrineAnalysis(){
  const r = state.photoAnalysis?.result;
  if(!r) return;
  const urine = URINE_SCALE.find(u=>u.level===r.level) || {};
  const detail = `Urination — ${r.hydration} (colour scale level ${r.level}/8: ${r.colour_observed})`;
  const note = r.alert ? `Action required: ${r.action}` : r.action;
  addEntry("toilet", detail, note, {mode:"specific",time:nowT()}, false, state.entryPhotos.length ? [...state.entryPhotos] : []);
  if(r.alert){
    // Auto-add a handover note entry
    const handover = `Hydration concern — ${state.client} presented with ${r.hydration.toLowerCase()} urine (level ${r.level}/8). ${r.action} Monitor fluid intake next shift.`;
    addEntry("support", handover, "", {mode:"specific",time:nowT()});
  }
  state.showPhotoAnalysis = false;
  state.photoAnalysis = null;
  render();
}

function acceptStoolAnalysis(){
  const r = state.photoAnalysis?.result;
  if(!r) return;
  const ov = state.stoolTypeOverride;
  const finalType = ov === null ? r.type : ov;
  const bristol = BRISTOL_SCALE.find(b=>b.type===finalType);

  let detail;
  if(ov === 0){
    detail = "Bowel movement";
  } else {
    detail = `Bowel movement – Bristol Type ${finalType} (${bristol?.category || r.category})`;
  }
  const note = ov!==null && ov!==r.type && ov!==0 ? `Staff assessment: Type ${finalType}. AI suggested Type ${r.type}.` : "";

  addEntry("toilet", detail, note, {mode:"specific",time:nowT()}, false, state.entryPhotos.length ? [...state.entryPhotos] : []);

  // Auto-add handover for Type 1 or Type 7
  if(finalType===1 || finalType===7){
    const handoverText = finalType===1
      ? `Bowel concern — ${state.client} had a Type 1 Bristol stool (severe constipation). Increased fluid and fibre intake encouraged. Monitor bowel movements next shift. Contact GP if no improvement within 3 days.`
      : `Bowel concern — ${state.client} had a Type 7 Bristol stool (diarrhoea). Fluids encouraged and intake monitored. Monitor for signs of dehydration. Contact GP or on-call if persists more than 24 hours or if blood, fever, or pain present.`;
    addEntry("incident", handoverText, "Handover recommended", {mode:"specific",time:nowT()});
  }

  state.showPhotoAnalysis = false;
  state.photoAnalysis = null;
  state.stoolTypeOverride = null;
  render();
}


function promptPhotoAnalysis(){
  // Ask what type of photo was taken
  const photo = state.entryPhotos[state.entryPhotos.length - 1];
  if(!photo){ alert("Please attach a photo first."); return; }
  state.showPhotoAnalysis = true;
  state.photoAnalysis = {type:"detecting", pending:true, result:null};
  render();

  // First detect what's in the photo, then run appropriate analysis
  const key = state.aiProvider==="groq" ? state.groqKey : state.apiKey;
  if(!key){
    state.photoAnalysis = {type:"detecting", pending:false, result:null, error:"No API key set."};
    render(); return;
  }

  const b64 = photo.replace(/^data:image\/\w+;base64,/, "");
  const mediaType = photo.startsWith("data:image/png") ? "image/png" : "image/jpeg";

  const detect = async () => {
    try {
      let detectedType = "unknown";

      if(state.aiProvider==="groq"){
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
          body:JSON.stringify({
            model:"meta-llama/llama-4-scout-17b-16e-instruct",
            max_tokens:100,
            messages:[{role:"user",content:[
              {type:"text",text:'Does this photo show: (a) urine in a toilet bowl, (b) a stool/poo, or (c) neither? Reply with ONLY one word: "urine", "stool", or "neither".'},
              {type:"image_url",image_url:{url:`data:${mediaType};base64,${b64}`}}
            ]}]
          })
        });
        const d = await res.json();
        const txt = (d.choices?.[0]?.message?.content || "").toLowerCase().trim();
        detectedType = txt.includes("urine") ? "urine" : txt.includes("stool") ? "stool" : "unknown";
      } else {
        const res = await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({
            model:state.aiModel,
            max_tokens:50,
            messages:[{role:"user",content:[
              {type:"image",source:{type:"base64",media_type:mediaType,data:b64}},
              {type:"text",text:'Does this photo show: (a) urine in a toilet bowl, (b) a stool/poo, or (c) neither? Reply with ONLY one word: "urine", "stool", or "neither".'}
            ]}]
          })
        });
        const d = await res.json();
        const txt = (d.content?.map(b=>b.text||"").join("") || "").toLowerCase();
        detectedType = txt.includes("urine") ? "urine" : txt.includes("stool") ? "stool" : "unknown";
      }

      if(detectedType==="unknown"){
        // Show manual selection
        state.photoAnalysis = {type:"unknown", pending:false, result:null, needsSelection:true};
        render();
      } else {
        await analysePhoto(photo, detectedType);
      }
    } catch(err){
      state.photoAnalysis = {type:"detecting", pending:false, result:null, error:err.message};
      render();
    }
  };
  detect();
}

// ── Adjective detection ────────────────────────────────────────────────────
const ADJECTIVES_SET = new Set(['scrambled', 'fried', 'poached', 'boiled', 'grilled', 'baked', 'steamed', 'raw', 'hot', 'cold', 'warm', 'chilled', 'frozen', 'fresh', 'cooked', 'full', 'partial', 'half', 'small', 'large', 'medium', 'big', 'little', 'hard', 'soft', 'smooth', 'lumpy', 'thick', 'thin', 'light', 'heavy', 'whole', 'chopped', 'sliced', 'mashed', 'pureed', 'crushed', 'blended', 'sweet', 'sour', 'salty', 'spicy', 'bland', 'mild', 'strong', 'white', 'brown', 'black', 'red', 'yellow', 'green', 'pale', 'dark', 'golden', 'assisted', 'independent', 'supervised', 'verbal', 'physical', 'continent', 'incontinent', 'normal', 'loose', 'constipated', 'clear', 'cloudy', 'concentrated', 'diluted', 'voluntary', 'involuntary', 'spontaneous']);

function wordType(text){
  // Returns 'adjective' if ALL words in text are adjectives, else 'noun'
  const words = text.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(Boolean);
  if(!words.length) return 'noun';
  const allAdj = words.every(w => ADJECTIVES_SET.has(w));
  return allAdj ? 'adjective' : 'noun';
}


// ── Note text casing ─────────────────────────────────────────────────────
// Lowercase chip text except the first character of the whole note
function chipToLower(text){
  // Lowercase everything — sentence-start capitalisation applied by tokenToText
  return (text||'').toLowerCase();
}


function tokenToText(token){
  const groups=token.groups||[];
  if(!groups.length){
    const pd=(token.pendingDescs||[]).map(d=>chipToLower(d.text)).join(" ");
    return pd?token.primary+' — waiting: '+pd+'…':token.primary;
  }
  const gStrs=groups.map((g,gi)=>{
    // Noun lowercase, descriptor lowercase
    const nText=chipToLower(g.noun.text);
    if(!g.descs||!g.descs.length)return g.noun.count>1?nText+" x"+g.noun.count:nText;
    const desc=g.descs[0];
    const dText=chipToLower(desc.text);
    const d=desc.pre?dText+" "+nText:nText+" "+dText;
    return g.noun.count>1?d+' x'+g.noun.count:d;
  });
  // Primary stays as-is (user entered), rest lowercase, joined with ", "
  return token.primary+', '+gStrs.join(', ');
}
// ── Token management ────────────────────────────────────────────────────────
function getPrimaryToken(){
  return state.noteTokens.find(t => t.primary === state.primaryChip) || null;
}

function addPrimaryToken(primary){
  if(state.noteTokens.find(t=>t.primary===primary))return;
  state.noteTokens=[...state.noteTokens,{id:Date.now()+Math.random(),primary,groups:[],pendingDescs:[],activeGroupId:null}];
}

function removeToken(tokenId){
  state.noteTokens = state.noteTokens.filter(t => t.id !== tokenId);
  render();
}

function addItemToToken(primary,text,explicitType){
  const type=explicitType||wordType(text);
  state.noteTokens=state.noteTokens.map(t=>{
    if(t.primary!==primary)return t;
    const grps=t.groups||[];
    const pending=t.pendingDescs||[];
    if(type==='adjective'||type==='descriptor'){
      if(!grps.length){
        // Hold as pending (no noun yet)
        return{...t,pendingDescs:[{id:Date.now()+Math.random(),text}]};
      }
      const aid=t.activeGroupId||grps[grps.length-1].id;
      return{...t,groups:grps.map(g=>{
        if(g.id!==aid)return g;
        // REPLACE existing descriptor (not append)
        return{...g,descs:[{id:Date.now()+Math.random(),text,pre:false}]};
      })};
    }else{
      const ng={id:Date.now()+Math.random(),
        noun:{id:Date.now()+Math.random()+.1,text,count:1},
        descs:pending.length?[{...pending[0],pre:true}]:[]};
      return{...t,groups:[...grps,ng],activeGroupId:ng.id,pendingDescs:[]};
    }
  });
}
function removeItemFromToken(tid,iid){removeGroup(tid,iid);}

function incrementGroupNoun(tokenId,groupId,delta){
  state.noteTokens=state.noteTokens.map(t=>{if(t.id!==tokenId)return t;
    return{...t,groups:(t.groups||[]).map(g=>g.id!==groupId?g:{...g,noun:{...g.noun,count:Math.max(1,g.noun.count+delta)}})};
  });render();
}
function removeGroup(tokenId,groupId){
  state.noteTokens=state.noteTokens.map(t=>{if(t.id!==tokenId)return t;
    const ng=(t.groups||[]).filter(g=>g.id!==groupId);return{...t,groups:ng,activeGroupId:ng.length?ng[ng.length-1].id:null};
  });render();
}
function removeDescriptor(tokenId,groupId,descId){
  state.noteTokens=state.noteTokens.map(t=>{if(t.id!==tokenId)return t;
    return{...t,groups:(t.groups||[]).map(g=>g.id!==groupId?g:{...g,descs:g.descs.filter(d=>d.id!==descId)})};
  });render();
}
function setActiveGroup(tokenId,groupId){
  state.noteTokens=state.noteTokens.map(t=>t.id!==tokenId?t:{...t,activeGroupId:groupId});
  const tok=state.noteTokens.find(t=>t.id===tokenId);
  const grp=tok?.groups?.find(g=>g.id===groupId);
  if(grp){state.drillOptions=followupFor(grp.noun.text)||[];}
  render();
}

function adjustItemCount(tokenId, itemId, delta){
  state.noteTokens = state.noteTokens.map(t => {
    if(t.id !== tokenId) return t;
    return {...t, items: t.items.map(it => {
      if(it.id !== itemId) return it;
      const newCount = Math.max(1, it.count + delta);
      return {...it, count: newCount};
    })};
  });
  render();
}

function handleChipTap(chip){
  // If this chip is already the active primary — deselect/clear
  if(state.primaryChip===chip){
    state.primaryChip=null;state.drillOptions=[];state.chipCounts={};

  if(state.primaryChip&&state.primaryChip!==chip){

  }
  state.primaryChip=chip;

// Validate a time string — accept HH:MM (24hr) or H:MM am/pm
function parseTimeStr(str){
  if(!str)return null;
  str=str.trim();
  // HH:MM 24hr
  let m=str.match(/^(\d{1,2}):(\d{2})$/);
  if(m){
    const h=parseInt(m[1]),mn=parseInt(m[2]);
    if(h>=0&&h<=23&&mn>=0&&mn<=59)return String(h).padStart(2,"0")+":"+String(mn).padStart(2,"0");
  }
  // H:MM am/pm
  m=str.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/i);
  if(m){
    let h=parseInt(m[1]);const mn=parseInt(m[2]);const ap=m[3].toLowerCase();
    if(ap==="pm"&&h!==12)h+=12;
    if(ap==="am"&&h===12)h=0;
    if(h>=0&&h<=23&&mn>=0&&mn<=59)return String(h).padStart(2,"0")+":"+String(mn).padStart(2,"0");
  }
  return null;
}

// Parse raw text log line: "[HH:MM] Category: detail — note"
function parseRawLogLine(line,lineNum){
  line=line.trim();
  if(!line||line.startsWith("="))return null;
  // Skip header lines
  if(/^(SHIFT LOG EXPORT|Date:|DSW:|Client:|Shift start:|Entries:|SHIFT SUMMARY|SHIFT LOG|================)/.test(line))return null;

  const timeMatch=line.match(/^\[([^\]]+)\]\s+(.+)$/);
  if(!timeMatch)return{error:`Line ${lineNum}: Could not parse — expected format [HH:MM] Category: detail`,line};

  const rawTime=timeMatch[1];
  const rest=timeMatch[2];

  // Handle "time not specified" and "between X–Y"
  let timeEntry;
  if(rawTime==="time not specified"||rawTime==="(time not specified)"){
    timeEntry={mode:"ns"};
  } else if(rawTime.startsWith("between ")){
    const rng=rawTime.replace("between ","").split(/[–-]/);
    const from=parseTimeStr(rng[0]?.trim());
    const to=parseTimeStr(rng[1]?.trim());
    if(!from||!to)return{error:`Line ${lineNum}: Could not parse time range "${rawTime}"`,line};
    timeEntry={mode:"range",from,to};
  } else {
    const t=parseTimeStr(rawTime);
    if(!t)return{error:`Line ${lineNum}: Invalid time "${rawTime}" — use HH:MM (24hr) or H:MM am/pm`,line};
    timeEntry={mode:"specific",time:t};
  }

  // Split "Category: detail — note" 
  const colonIdx=rest.indexOf(": ");
  if(colonIdx===-1)return{error:`Line ${lineNum}: Missing ": " between category and detail`,line};
  const catLabel=rest.slice(0,colonIdx).trim();
  const afterCat=rest.slice(colonIdx+2);

  // Split detail from note (note follows " — ")
  // Also strip transport info which starts with " | Transport:"
  const transIdx=afterCat.indexOf(" | Transport:");
  const mainPart=transIdx>=0?afterCat.slice(0,transIdx):afterCat;
  const dashIdx=mainPart.indexOf(" — ");
  const detail=dashIdx>=0?mainPart.slice(0,dashIdx).trim():mainPart.trim();
  const note=dashIdx>=0?mainPart.slice(dashIdx+3).trim():"";

  // Match category label to key
  const catKey=Object.keys(state.chips).find(k=>
    state.chips[k].label.toLowerCase()===catLabel.toLowerCase()
  )||"other";

  return{
    id:Date.now()+Math.random(),
    category:catKey,
    detail,
    note,
    timeEntry,
    fromVoice:false,
    catConf:true,
    transport:null,
    _rawTime:rawTime,
    _catLabel:catLabel
  };
}

// Parse JSON import payload
function parseJSONImport(text){
  const payload=JSON.parse(text);
  if(!payload.version||!Array.isArray(payload.entries))throw new Error("Invalid shift log JSON — missing version or entries array");
  const errors=[];
  const entries=payload.entries.map((e,i)=>{
    // Validate timeEntry
    if(e.timeEntry){
      if(e.timeEntry.mode==="specific"&&e.timeEntry.time){
        const t=parseTimeStr(e.timeEntry.time);
        if(!t){errors.push(`Entry ${i+1} (${e.detail}): invalid time "${e.timeEntry.time}"`);e.timeEntry.time=nowT();}
        else e.timeEntry.time=t;
      }
    } else {
      e.timeEntry={mode:"ns"};
    }
    return{
      id:Date.now()+Math.random()+i,
      category:e.category||"other",
      detail:e.detail||"",
      note:e.note||"",
      timeEntry:e.timeEntry,
      fromVoice:e.fromVoice||false,
      catConf:e.catConf!==false,
      transport:e.transport||null
    };
  });
  return{entries,errors,meta:{dsw:payload.dsw,client:payload.client,shiftStart:payload.shiftStart,shiftDate:payload.shiftDate}};
}

// Parse raw text import
function parseRawTextImport(text){
  const lines=text.split("\n");
  const errors=[];
  const entries=[];
  lines.forEach((line,i)=>{
    const result=parseRawLogLine(line,i+1);
    if(!result)return; // skip blank/header
    if(result.error){errors.push(result.error);return;}
    entries.push(result);
  });
  return{entries,errors,meta:{}};
}

// Preview import from textarea content
function previewImport(){
  const text=state.importText.trim();
  if(!text){state.importErrors=["Paste your shift log above first."];state.importPreview=[];render();return;}
  try{
    let result;
    if(text.startsWith("{")&&text.includes('"version"')){
      result=parseJSONImport(text);
    } else {
      result=parseRawTextImport(text);
    }
    state.importPreview=result.entries;
    state.importErrors=result.errors;
    state.importMeta=result.meta||{};
    render();
  } catch(err){
    state.importErrors=["Parse error: "+err.message];
    state.importPreview=[];
    render();
  }
}

// Confirm and merge import into current shift
function confirmImport(){
  if(!state.importPreview.length)return;
  // Merge: add imported entries, then sort all by time
  const merged=[...state.entries,...state.importPreview];
  // Sort by timeEntry — specific times first, then ranges, then unspecified
  merged.sort((a,b)=>{
    const ta=a.timeEntry?.mode==="specific"?a.timeEntry.time:a.timeEntry?.mode==="range"?a.timeEntry.from:"99:99";
    const tb=b.timeEntry?.mode==="specific"?b.timeEntry.time:b.timeEntry?.mode==="range"?b.timeEntry.from:"99:99";
    return ta.localeCompare(tb);
  });
  state.entries=merged;
  state.importText="";state.importPreview=[];state.importErrors=[];state.importDone=true;
  state.showImport=false;
  // Save client profile learning for imported entries
  state.importPreview.forEach(e=>learn(e.category,e.detail));
  render();
}

function buildRawLog(){

  ].join("\n");
  const rows=s.entries.map(e=>{
    const cat=s.chips[e.category];
    const t=fmtTime(e.timeEntry);
    const tr=e.transport&&e.transport.vehicle
      ?" | Transport: "+(e.transport.vehicle==="ppv"?"PPV":e.transport.vehicle==="work"?"Work vehicle":"PT – "+(e.transport.ptSub||"?"))+" "+( e.transport.km||"?")+"km"+(e.transport.overLimit?" ⚠️ OVER LIMIT":"")
      :"";
    const note=e.note?" — "+e.note:"";
    return "["+t+"] "+( cat?.label||e.category)+": "+e.detail+note+tr;
  });
  return header+rows.join("\n");
}

function buildCSV(){
  const s=state;
  const header="Time,Category,Detail,Note,Vehicle,KM,KM Over Limit,On Call Approved";
  const rows=s.entries.map(e=>{
    const cat=s.chips[e.category];
    const t=fmtTime(e.timeEntry);
    const tr=e.transport||{};
    const esc=v=>v===undefined||v===null||v===""?"":'"'+String(v).replace(/"/g,'""')+'"';
    return [
      esc(t),
      esc(cat?.label||e.category),
      esc(e.detail),
      esc(e.note),
      esc(tr.vehicle==="ppv"?"Personal vehicle (PPV)":tr.vehicle==="work"?"Work vehicle":tr.vehicle==="pt"?"Public transport – "+(tr.ptSub||"?"):""),
      esc(tr.km||""),
      tr.overLimit?"Yes":"",
      tr.overLimit?(tr.overApproved?"Yes":"No"):""
    ].join(",");
  });
  return header+"\n"+rows.join("\n");
}

function buildSummary(){
  const s=state;
  // Group entries by category
  const groups={};
  s.entries.forEach(e=>{
    const label=s.chips[e.category]?.label||e.category;
    if(!groups[label])groups[label]=[];
    groups[label].push(e);
  });
  const lines=[
    "SHIFT SUMMARY",
    "=============",
    "Date:  "+fmtDate(),
    "DSW:   "+s.dsw,
    "Client:"+s.client,
    "Shift: "+s.shiftStart+" onwards",
    "Total entries: "+s.entries.length,
    ""
  ];
  Object.entries(groups).forEach(([label,entries])=>{
    lines.push(label.toUpperCase()+" ("+entries.length+")");
    entries.forEach(e=>{
      const t=fmtTime(e.timeEntry);
      lines.push("  • ["+t+"] "+e.detail+(e.note?" — "+e.note:""));
    });
    lines.push("");
  });
  return lines.join("\n");
}

function copyExport(type){
  let text="";
  if(type==="raw")text=buildRawLog();
  else if(type==="csv")text=buildCSV();
  else if(type==="summary")text=buildSummary();
  navigator.clipboard.writeText(text).then(()=>{
    state.exportCopied=type;
    render();
    setTimeout(()=>{state.exportCopied="";render();},2500);
  });
}

function downloadExport(type){
  let text="",filename="",mime="text/plain";
  if(type==="raw"){text=buildRawLog();filename="shift-log-"+state.client.replace(/\s+/g,"-")+"-"+new Date().toISOString().slice(0,10)+".txt";}
  else if(type==="csv"){text=buildCSV();filename="shift-log-"+state.client.replace(/\s+/g,"-")+"-"+new Date().toISOString().slice(0,10)+".csv";mime="text/csv";}
  else if(type==="summary"){text=buildSummary();filename="shift-summary-"+state.client.replace(/\s+/g,"-")+"-"+new Date().toISOString().slice(0,10)+".txt";}
  const blob=new Blob([text],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

function getWeekDates(baseDate){
  const d=new Date(baseDate);
  const day=d.getDay();
  const monday=new Date(d);
  monday.setDate(d.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{
    const dd=new Date(monday);
    dd.setDate(monday.getDate()+i);
    return dd.toISOString().slice(0,10);
  });
}

function fmtCalDay(dateStr){
  const d=new Date(dateStr+"T12:00:00");
  return d.toLocaleDateString("en-AU",{weekday:"short"}).slice(0,3);
}
function fmtCalDayNum(dateStr){
  return new Date(dateStr+"T12:00:00").getDate();
}
function fmtCalMonth(dateStr){
  return new Date(dateStr+"T12:00:00").toLocaleDateString("en-AU",{month:"long",year:"numeric"});
}

// ── Focus restoration after render ────────────────────────────────────────
// Saves which input had focus + cursor position before render wipes the DOM
let _focusId=null,_focusSel=[0,0];
function saveFocus(){
  const el=document.activeElement;
  if(el&&(el.tagName==="INPUT"||el.tagName==="TEXTAREA")&&el.id){
    _focusId=el.id;
    try{_focusSel=[el.selectionStart,el.selectionEnd];}catch(e){_focusSel=[0,0];}
  } else { _focusId=null; }
}
function restoreFocus(){
  if(!_focusId)return;
  const el=document.getElementById(_focusId);
  if(!el)return;
  try{el.focus();el.setSelectionRange(_focusSel[0],_focusSel[1]);}catch(e){el.focus();}
  _focusId=null;
}

// ── AI provider helper ────────────────────────────────────────────────────
async function aiFetch(body){
  const isGroq=state.aiProvider==="groq";
  const key=isGroq?state.groqKey:state.apiKey;
  const url=isGroq
    ?"https://api.groq.com/openai/v1/chat/completions"
    :"https://api.anthropic.com/v1/messages";

  if(isGroq){
    // Groq uses OpenAI-compatible format
    const messages=body.messages;
    const res=await fetch(url,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({model:state.aiModel,max_tokens:body.max_tokens,messages})
    });
    const d=await res.json();
    if(d.error)throw new Error(d.error.message||JSON.stringify(d.error));
    // Normalise to Anthropic-style response so callers work the same way
    const text=d.choices?.[0]?.message?.content||"";
    return {json:async()=>({content:[{type:"text",text}]})};
  } else {
    // Anthropic format
    const res=await fetch(url,{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:state.aiModel,...body})
    });
    return res;
  }
}

async function endShift(){
  const _key=state.aiProvider==="groq"?state.groqKey:state.apiKey;
  if(!_key){state.screen="review";state.generating=false;state.suggestions=[];state.suggError=`No ${state.aiProvider==="groq"?"Groq":"Anthropic"} API key set. Go to Setup → Admin settings → unlock with PIN → paste your API key.`;state.report="";render();return;}
  state.shiftEnd=nowT();state.generating=true;state.screen="review";state.suggestions=[];state.suggError="";state.report="";render();
  const log=state.entries.map(e=>`[${fmtTimeReport(e.timeEntry)}] ${state.chips[e.category]?.label}: ${e.detail}${e.note?` — ${e.note}`:""}${e.transport?` [${e.transport.vehicle==="walk"?"Walking":e.transport.vehicle}, ${e.transport.km||"?"}km]`:""}`).join("\n");
  try{const r=await aiFetch({max_tokens:1200,messages:[{role:"system",content:"You are an expert NDIS disability support documentation assistant. Your job is to help DSWs (Disability Support Workers) review their shift logs before generating a formal shift note. You have deep knowledge of NDIS practice standards, person-centred support, and professional shift note writing. You are precise, practical, and always base suggestions only on what is already in the shift log. You never invent events or support that did not happen. When suggesting example sentences, write them in first-person professional language as the DSW would write them in a formal shift note. Return valid JSON only — no markdown, no explanation, no preamble."},{role:"user",content:"I am reviewing my disability support shift log before generating a formal NDIS shift note. Shift date: "+fmtDate()+" Shift started: "+state.shiftStart+" DSW: "+state.dsw+" Client: "+state.client+"\n\nPlease do TWO things:\n\nTASK 0 — FLUID MISMATCHES:\nCheck if any Food & Meals entries are actually fluids (milk, juice, water, cordial, tea, coffee, smoothie, formula, supplement drink, sports drink). If yes, create a type_fix suggestion to re-categorise to Fluids. Set type:\"category_fix\", entryRef to the entry detail, suggestedCategory:\"fluid\".\n\nTASK 1 — TIME CORRECTIONS:\nCheck each log entry: if the detail text explicitly mentions a time (e.g. \"at 8\", \"around 9am\", \"8 o'clock\") that is different from the logged timestamp, flag it as a time_fix. Use the shift start time to determine whether the mentioned time is AM or PM. If you cannot confidently determine AM or PM, provide both options in altTime.\n\nTASK 2 — SUPPORT SUGGESTIONS:\nFor each logged entry, consider what additional support the DSW may have provided but forgotten to document. Ask one short, specific question and provide 3-5 example sentences the DSW can select. Each example must be a complete, professional sentence in first person as it would appear in a formal shift note. Examples should be specific and varied — different prompts, actions, outcomes. Focus especially on: how support was physically provided, verbal prompts used, client responses, level of independence shown, safety considerations.\n\nReturn ONLY a JSON array in this exact format:\n[\n  {\"id\":\"1\",\"type\":\"time_fix\",\"text\":\"Entry logged at 10:30 but note says 'at 8' — correct the time?\",\"entryRef\":\"first word of the entry detail\",\"suggestedTime\":\"08:00\",\"altTime\":\"20:00\"},\n  {\"id\":\"2\",\"type\":\"suggestion\",\"text\":\"Did you provide any verbal prompts during the shower?\",\"examples\":[\"I verbally prompted James step by step throughout the shower, directing him to wash each body part in sequence.\",\"I encouraged James by praising his efforts and reminding him of the next steps when he paused.\"]}\n]\n\nIf there is nothing to flag or suggest, return an empty array: []\n\nShift log (format: [logged_time] Category: detail — note):\n"+log}]});const data=await r.json();const raw=data.content?.map(b=>b.text||"").join("").trim().replace(/```json|```/g,"").trim();
    if(!raw)throw new Error("Empty response: "+JSON.stringify(data));
    state.suggestions=JSON.parse(raw).map(s=>({...s,accepted:null,selExamples:[],workerDetail:"",timeApplied:false}));}
  catch(err){console.error("Suggestions API error:",err);state.suggestions=[];state.suggError=err.message||String(err);}
  state.generating=false;render();
}
async function genReport(){
  const _key2=state.aiProvider==="groq"?state.groqKey:state.apiKey;
  if(!_key2){state.report=`No ${state.aiProvider==="groq"?"Groq":"Anthropic"} API key set. Go to Setup → Admin settings → unlock → paste your API key.`;state.screen="report";state.generating=false;render();return;}
  state.generating=true;state.screen="report";render();
  const log=state.entries.map(e=>{const tr=e.transport;const trStr=tr&&tr.vehicle?` | Transport: ${tr.vehicle==="ppv"?"Personal vehicle (PPV)":tr.vehicle==="work"?"Work vehicle":tr.vehicle==="walk"?"Walking":`Public transport (${tr.ptSub||"?"})`}, ${tr.km||"?"}km${tr.overLimit?` — OVER ${state.kmLimit}km LIMIT, On Call approved: ${tr.overApproved?"YES":"NO"}, Reason: ${tr.overReason||"not stated"}`:""}`:""
    return`[${fmtTimeReport(e.timeEntry)}] ${state.chips[e.category]?.label}: ${e.detail}${e.note?` — ${e.note}`:""}${trStr}`;}).join("\n");
  const acc=state.suggestions.filter(s=>s.accepted===true);
  const accB=acc.length?`\n\nConfirmed additions:\n${acc.map(s=>{const p=[...(s.selExamples||[])];if(s.workerDetail?.trim())p.push(s.workerDetail.trim());return`- ${s.text}\n  Detail: ${p.join(" ")}`;}).join("\n")}`:""
  const overE=state.entries.filter(e=>e.transport?.overLimit);
  const overB=overE.length?`\n\nKM OVERAGES:\n${overE.map(e=>`- ${e.detail}: ${e.transport.km}km (limit: ${state.kmLimit}km). On Call approved: ${e.transport.overApproved?"YES":"NO"}. Reason: ${e.transport.overReason||"not provided"}. Manager (${state.clientManager||"unspecified"}) notified: ${e.transport.managerNotified?"YES":"NO"}.`).join("\n")}`:""
  try{const r=await aiFetch({max_tokens:1800,messages:[{role:"system",content:"You are a professional NDIS shift note writer. You write formal, accurate, person-centred disability support shift notes on behalf of DSWs. Your writing is clear, professional, and uses appropriate disability support terminology. \n\nCORE RULES you must follow without exception:\n1. Write in THIRD PERSON referring to DSW by name (e.g. \\\"DSW Edward assisted James...\\\"). NEVER use \\\"I\\\" - always write \\\"DSW [name]\\\".\n2. Refer to the client by first name ONLY — never \"the client\", never full name\n3. Write in PARAGRAPHS only — absolutely no bullet points, no numbered lists, no headers\n4. Include ONLY information that is explicitly in the shift log or confirmed additions — never invent, infer, or embellish\n5. For every event, include the time exactly as it was recorded (specific time, time range, or note as 'time not specified')\n6. For Direct Support entries: describe HOW the support was provided in specific step-by-step detail — what was said, what was demonstrated, what was handed to the person, what prompts were used, how the person responded, what they did independently\n7. For transport: always include vehicle type and kilometres. If km limit was exceeded, document approval status, reason, and manager notification in a dedicated paragraph\n8. Group related events into logical paragraphs (e.g. morning routine, meals, outings, hygiene, support provided, incidents)\n9. End with a clear handover paragraph summarising the person's presentation, mood, and wellbeing at end of shift\n10. Write in past tense throughout\n\nTONE: Professional, factual, respectful, person-centred. Avoid clinical or overly formal language where plain professional language works just as well."},{role:"user",content:`Please write the shift note for today's shift.\n\nSHIFT DETAILS:\nDate: ${fmtDate()}\nShift time: ${state.shiftStart} to ${state.shiftEnd}\nDSW: ${state.dsw}\nClient: ${state.client}\nClient's allocated manager: ${state.clientManager||"not recorded"}\n\nSHIFT LOG (chronological — include ALL entries with their recorded times):\n${log}${accB?`\n\nCONFIRMED ADDITIONAL DETAILS (include all of these in the report — the DSW has verified these occurred):\n${accB}`:""}${overB?`\n\n${overB}`:""}\n\nWrite the complete shift note now. Remember: paragraphs only, DSW referred to as "DSW ${state.dsw}" throughout (never "I"), client by first name only (${state.client}), every event with its recorded time.`}]});const data=await r.json();
    const txt=data.content?.map(b=>b.text||"").join("\n");
    if(!txt){const errDetail=JSON.stringify(data);throw new Error("No content in response: "+errDetail);}
    state.report=txt;}
  catch(err){console.error("Report API error:",err);state.report="Error generating report.\n\nDetails: "+( err.message||String(err))+"\n\nPlease copy the raw log below and paste manually.";}
  state.generating=false;render();
}

function openLayoutEditor(){state.draftLayout=[...state.pageLayout];state.draftCatOrder=[...state.catOrder];state.screen="layout";render();}
function saveLayout(){state.pageLayout=[...state.draftLayout];state.catOrder=[...state.draftCatOrder];ls.s("pageLayout",state.pageLayout);ls.s("catOrder",state.catOrder);state.draftLayout=null;state.draftCatOrder=null;state.screen="settings";render();}
function resetLayout(){state.draftLayout=[...DEFAULT_LAYOUT];state.draftCatOrder=[...DEFAULT_CAT_ORDER];render();}
function moveItem(list,idx,dir){
  const arr=list==="blocks"?[...state.draftLayout]:[...state.draftCatOrder];
  const ni=idx+dir;if(ni<0||ni>=arr.length)return;
  [arr[idx],arr[ni]]=[arr[ni],arr[idx]];
  if(list==="blocks")state.draftLayout=arr;else state.draftCatOrder=arr;
  render();
}

function wireDragDrop(){
  let dragId=null,dragList=null,dragEl=null;
  function getEl(id,list){return document.querySelector(`.drag-item[data-id="${id}"][data-list="${list}"]`);}
  function getItems(list){return Array.from(document.querySelectorAll(`.drag-item[data-list="${list}"]`));}
  function onDragStart(e,el){dragId=el.dataset.id;dragList=el.dataset.list;dragEl=el;el.classList.add("dragging");if(e.dataTransfer)e.dataTransfer.effectAllowed="move";}
  function onDragOver(e,clientY){
    if(!dragEl)return;e.preventDefault();
    const items=getItems(dragList);
    const target=items.find(it=>{if(it===dragEl)return false;const r=it.getBoundingClientRect();return clientY>=r.top&&clientY<=r.bottom;});
    if(target){items.forEach(it=>it.classList.remove("drag-over"));target.classList.add("drag-over");
      const arr=dragList==="blocks"?[...state.draftLayout]:[...state.draftCatOrder];
      const fi=arr.indexOf(dragId),ti=arr.indexOf(target.dataset.id);
      if(fi!==-1&&ti!==-1&&fi!==ti){arr.splice(fi,1);arr.splice(ti,0,dragId);
        if(dragList==="blocks")state.draftLayout=arr;else state.draftCatOrder=arr;
        render();dragEl=document.querySelector(`.drag-item[data-id="${dragId}"][data-list="${dragList}"]`);
        if(dragEl)dragEl.classList.add("dragging");}
    }
  }
  function onDragEnd(){if(dragEl)dragEl.classList.remove("dragging");document.querySelectorAll(".drag-item").forEach(el=>el.classList.remove("drag-over"));dragEl=null;dragId=null;dragList=null;}
  document.querySelectorAll(".drag-item").forEach(el=>{
    el.setAttribute("draggable","true");
    el.addEventListener("dragstart",e=>onDragStart(e,el));
    el.addEventListener("dragend",onDragEnd);
    el.addEventListener("dragover",e=>onDragOver(e,e.clientY));
    el.addEventListener("drop",e=>{e.preventDefault();onDragEnd();});
    let tY=0;
    el.addEventListener("touchstart",e=>{tY=e.touches[0].clientY;onDragStart(e,el);},{passive:true});
    el.addEventListener("touchmove",e=>{onDragOver(e,e.touches[0].clientY);e.preventDefault();},{passive:false});
    el.addEventListener("touchend",onDragEnd,{passive:true});
  });
}

// ── Global action handlers ─────────────────────────────────────────────────

function tokensToNote(tokens,freeNote,consumption){
  const parts=tokens.map(tokenToText);
  if(consumption&&consumption.trim())parts.push(consumption.trim());
  if(freeNote&&freeNote.trim())parts.push(freeNote.trim());
  return parts.join('. ');
}
function doLog(){
  const ftA=document.getElementById("freeNoteTA");if(ftA)state.freeNote=ftA.value;
  const cmlIn=document.getElementById("customMLIn");if(cmlIn&&cmlIn.value)state.entryConsumption=cmlIn.value+"ml";
  const te={...state.timeEntry};
  const photos=[...state.entryPhotos];
  const freeNote=state.freeNote.trim();
  // Each token = one entry. Tokens without items use just the primary as detail.
  // Free note attached to first entry only.
  if(!state.noteTokens.length && !freeNote) return;
  if(state.noteTokens.length){
    state.noteTokens.forEach((token,idx)=>{
      const note=idx===0?tokensToNote([],freeNote,state.entryConsumption):"";  // attach consumption+freeNote to first entry
      const detail=tokenToText(token);
      if(needsReceiptPrompt(state.activeCat,[token.primary],detail)&&!photos.length){
        state.receiptPendingLog={cat:state.activeCat,toLog:[detail],note,te,photos};
        state.showReceiptPrompt=true;state.receiptPhoto=null;render();return;
      }
      addEntry(state.activeCat,detail,note,te,false,photos);
    });
  } else if(freeNote){
    addEntry(state.activeCat,freeNote,"",te,false,photos);
  }
  state.activeCat=null;state.selChips=[];state.noteTokens=[];state.freeNote="";state.entryConsumption="";
  state.entryPhotos=[];state.chipTrail=[];state.drillOptions=[];
  state.chipCounts={};state.primaryChip=null;state.drillLoading=false;
  state.timeEntry={mode:"specific",time:nowT()};render();
}
function tC(c){state.selChips=state.selChips.includes(c)?state.selChips.filter(x=>x!==c):[...state.selChips,c];}

function addCustomChipToUser(catKey,chip){
  chip=chip.trim();if(!chip)return;
  const ucc={...state.userCustomChips};
  if(!ucc[catKey])ucc[catKey]=[];
  if(!ucc[catKey].includes(chip))ucc[catKey]=[chip,...ucc[catKey]];
  state.userCustomChips=ucc;ls.s("userCustomChips",ucc);
  if(!state.selChips.includes(chip))state.selChips=[...state.selChips,chip];
  state.showCustomChipInput=false;state.customChipInput="";
  render();
}
function removeUserCustomChip(catKey,chip){
  const ucc={...state.userCustomChips};
  if(ucc[catKey])ucc[catKey]=ucc[catKey].filter(c=>c!==chip);
  state.userCustomChips=ucc;ls.s("userCustomChips",ucc);
  state.selChips=state.selChips.filter(c=>c!==chip);
  render();
}

function openCat(k){state.activeCat=k;state.selChips=[];state.entryNote="";state.entryConsumption="";state.noteTokens=[];state.freeNote="";state.entryConsumption="";state.primaryChip=null;state.chipCounts={};state.entryPhotos=[];state.chipTrail=[];state.drillOptions=[];state.drillLoading=false;state.chipPageOffset=0;state.showCustomChipInput=false;state.customChipInput="";state.timeEntry={mode:"specific",time:nowT()};render();}
function qLog(cat,detail){addEntry(cat,detail,"",{mode:"specific",time:nowT()});render();}
function delE(id){state.entries=state.entries.filter(e=>e.id!==id);render();}
function setClient(c){state.client=c;render();}
function gS(sc){state.screen=sc;render();}
function newShift(){state.screen="setup";state.entries=[];state.report="";state.quickState="idle";state.quickText="";render();}

function addChip(k){const el=document.getElementById(`nc_${k}`);const v=(el?el.value:"").trim();if(!v)return;state.chips={...state.chips,[k]:{...state.chips[k],chips:[...state.chips[k].chips,v]}};ls.s("chips",state.chips);if(el)el.value="";render();}
function rmChip(k,c){state.chips={...state.chips,[k]:{...state.chips[k],chips:state.chips[k].chips.filter(x=>x!==c)}};ls.s("chips",state.chips);render();}
function rstC(k){state.chips={...state.chips,[k]:{...state.chips[k],chips:[...JSON.parse(JSON.stringify(CATS))[k].chips]}};ls.s("chips",state.chips);render();}

function skipAll(){state.suggestions=state.suggestions.map(s=>({...s,accepted:false}));render();}
function tEx(id,idx){const sg=state.suggestions.find(s=>s.id===id);if(!sg)return;const ex=sg.examples[idx];const cur=sg.selExamples||[];state.suggestions=state.suggestions.map(s=>s.id===id?{...s,selExamples:cur.includes(ex)?cur.filter(x=>x!==ex):[...cur,ex]}:s);render();}
function toggleAdmin(){state.showAdminUnlock=!state.showAdminUnlock;state.adminPinInput="";render();}
function setKmLim(v){state.kmLimit=parseFloat(v)||0;ls.s("kmLimit",state.kmLimit);}
function setAPin(v){if(v.trim()){state.adminPin=v.trim();ls.s("adminPin",v.trim());}}
function setAiModel(v){if(v.trim()){state.aiModel=v.trim();ls.s("aiModel",v.trim());}}
function setApiKey(v){state.apiKey=v.trim();ls.s("apiKey",v.trim());render();}
function applyTimeFix(suggId,time){
  const sg=state.suggestions.find(s=>s.id===suggId);if(!sg)return;
  const entry=state.entries.find(e=>sg.entryRef&&e.detail&&e.detail.toLowerCase().includes(sg.entryRef.toLowerCase().split(" ")[0]));
  if(entry)state.entries=state.entries.map(e=>e.id===entry.id?{...e,timeEntry:{mode:"specific",time}}:e);
  state.suggestions=state.suggestions.map(s=>s.id===suggId?{...s,accepted:true,timeApplied:true,chosenTime:time}:s);
  render();
}
function setGroqKey(v){state.groqKey=v.trim();ls.s("groqKey",v.trim());render();}
function setProvider(p){
  state.aiProvider=p;ls.s("aiProvider",p);
  // Switch to sensible default model for each provider
  if(p==="groq"&&(state.aiModel.startsWith("claude")||!state.aiModel)){state.aiModel="llama-3.3-70b-versatile";ls.s("aiModel",state.aiModel);}
  if(p==="anthropic"&&(state.aiModel.startsWith("llama")||state.aiModel.startsWith("gemma")||!state.aiModel)){state.aiModel="claude-haiku-4-5-20251001";ls.s("aiModel",state.aiModel);}
  render();
}
function setV(v){state.transport={...state.transport,vehicle:v};render();}
function setPT(v){state.transport={...state.transport,ptSub:v};render();}
function setKmV(v){state.transport={...state.transport,km:v};render();}
function setOA(v){state.transport={...state.transport,overApproved:v};render();}
function setOR(v){state.transport={...state.transport,overReason:v};}
function notifyMgr(){state.transport={...state.transport,managerNotified:true};render();}
function skipTransport(){state.showTransport=false;state.transportEntryId=null;render();}
function saveTrans(){saveTransport();render();}
function edTrans(id){const e=state.entries.find(x=>x.id===id);state.transportEntryId=id;state.transport=e?.transport||{vehicle:"",ptSub:"",km:"",overApproved:null,overReason:"",managerNotified:false};state.showTransport=true;render();}
function eTM(m){state.timeEntry={...state.timeEntry,mode:m};if(m==="specific"&&!state.timeEntry.time)state.timeEntry.time=nowT();render();}
function eTV(v){state.timeEntry={...state.timeEntry,time:v};}
function eTN(){state.timeEntry={...state.timeEntry,time:nowT()};render();}
function eTF(v){state.timeEntry={...state.timeEntry,from:v};}
function eTT(v){state.timeEntry={...state.timeEntry,to:v};}

// Purge edit history older than 7 days on startup
state.entries=state.entries.map(e=>{if(!e.editHistory)return e;const cutoff=Date.now()-7*24*60*60*1000;return{...e,editHistory:e.editHistory.filter(h=>new Date(h.savedAt).getTime()>cutoff)};});
// Route to portal if already logged in
if(state.loggedIn&&state.screen==="login")state.screen="portal";
render();
</script>
</body>
</html>
